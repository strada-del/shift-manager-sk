<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B2733">
<meta name="description" content="バイトのシフト入力・カレンダー表示・人件費計算がこれ1つでできるツール">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230F6B5C'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3E¥%3C/text%3E%3C/svg%3E">
<title>シフト管理</title>
<style>
:root{
  --bg:#EEF1F4; --surface:#FFFFFF; --ink:#1B2733; --sub:#66707B;
  --line:#DDE2E8; --accent:#0F6B5C; --accent-soft:#E2F0EC;
  --night:#4A4E9E; --night-soft:#E8E8F6;
  --sat:#2F6FB3; --sun:#C4453C;
  --radius:14px;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
}
button{font-family:inherit; cursor:pointer;}
input,select{font-family:inherit; font-size:15px; color:var(--ink);}

/* ===== ヘッダー ===== */
header{
  position:sticky; top:0; z-index:20; background:var(--ink); color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
header h1{font-size:16px; font-weight:700; letter-spacing:.06em;}
header h1 small{display:block; font-size:10px; font-weight:500; color:#9AA6B2; letter-spacing:.18em;}
#monthPicker{
  background:#2A3644; border:1px solid #3C4A5A; color:#fff; border-radius:10px;
  padding:6px 10px; font-size:14px; font-weight:600;
}

/* ===== タブ ===== */
nav{
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  background:var(--surface); border-top:1px solid var(--line);
  display:flex; padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1; background:none; border:none; padding:10px 0 8px; font-size:11px;
  color:var(--sub); display:flex; flex-direction:column; align-items:center; gap:2px;
}
nav button .ico{font-size:18px; line-height:1;}
nav button.active{color:var(--accent); font-weight:700;}
main{padding:16px 14px calc(84px + env(safe-area-inset-bottom)); max-width:760px; margin:0 auto;}
.page{display:none;}
.page.active{display:block;}

/* ===== 共通 ===== */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
.section-label{font-size:11px; font-weight:700; color:var(--sub); letter-spacing:.14em; margin:18px 4px 8px;}
.btn{
  border:none; border-radius:10px; padding:10px 16px; font-size:14px; font-weight:700;
}
.btn-primary{background:var(--accent); color:#fff;}
.btn-ghost{background:var(--accent-soft); color:var(--accent);}
.btn-danger{background:#FBEAE8; color:var(--sun);}

/* ===== シフト入力(日リスト) ===== */
.day-row{display:flex; border-bottom:1px solid var(--line); min-height:56px;}
.day-row:last-child{border-bottom:none;}
.day-date{
  width:56px; flex:none; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-right:1px solid var(--line); padding:8px 0;
}
.day-date .d{font-size:17px; font-weight:800; font-variant-numeric:tabular-nums;}
.day-date .w{font-size:11px; font-weight:600; color:var(--sub);}
.day-date.sat .d,.day-date.sat .w{color:var(--sat);}
.day-date.sun .d,.day-date.sun .w{color:var(--sun);}
.day-shifts{flex:1; padding:8px; display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
.chip{
  border:none; border-radius:8px; padding:5px 9px; font-size:12.5px; font-weight:600;
  color:#fff; display:inline-flex; gap:5px; align-items:center;
}
.chip .t{font-weight:500; opacity:.92; font-variant-numeric:tabular-nums;}
.chip-add{
  border:1.5px dashed var(--line); background:none; color:var(--sub);
  border-radius:8px; padding:4px 11px; font-size:15px; font-weight:700;
}
.day-cost{
  flex:none; align-self:center; padding:0 10px 0 4px; font-size:12px; color:var(--sub);
  font-variant-numeric:tabular-nums; text-align:right; min-width:66px;
}

/* ===== カレンダー ===== */
.cal-head{display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:11px; font-weight:700; color:var(--sub); padding:8px 0 4px;}
.cal-head span.sat{color:var(--sat);} .cal-head span.sun{color:var(--sun);}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); border-top:1px solid var(--line); border-left:1px solid var(--line);}
.cal-cell{
  border-right:1px solid var(--line); border-bottom:1px solid var(--line);
  min-height:78px; padding:3px; background:var(--surface); font-size:10px; cursor:pointer;
}
.cal-cell.empty{background:#F5F7F9; cursor:default;}
.cal-cell .num{font-size:11px; font-weight:800; font-variant-numeric:tabular-nums; margin-bottom:2px;}
.cal-cell.sat .num{color:var(--sat);} .cal-cell.sun .num{color:var(--sun);}
.cal-cell.today .num{background:var(--accent); color:#fff; border-radius:6px; padding:0 4px; display:inline-block;}
.mini{
  display:block; color:#fff; border-radius:4px; padding:2px 4px; margin-bottom:2px;
  font-weight:600; line-height:1.35; font-variant-numeric:tabular-nums;
}
.mini .nm{display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.mini .tm{display:block; font-weight:500; font-size:9px; opacity:.92; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-.02em;}

/* ===== 集計 ===== */
.total-hero{
  background:linear-gradient(135deg,#0F6B5C,#0B4F44); color:#fff; border-radius:var(--radius);
  padding:20px 18px; margin-bottom:14px;
}
.total-hero .lbl{font-size:11px; letter-spacing:.16em; font-weight:700; opacity:.85;}
.total-hero .val{font-size:34px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:.01em;}
.total-hero .val small{font-size:16px; font-weight:700; margin-left:2px;}
table.sum{width:100%; border-collapse:collapse; font-size:13.5px;}
table.sum th,table.sum td{padding:10px 8px; border-bottom:1px solid var(--line); text-align:right; font-variant-numeric:tabular-nums;}
table.sum th{font-size:11px; color:var(--sub); font-weight:700;}
table.sum th:first-child,table.sum td:first-child{text-align:left;}
table.sum tr:last-child td{border-bottom:none;}
td .dot{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:1px;}
.night-note{font-size:11px; color:var(--sub); margin-top:8px; padding:0 4px;}

/* ===== スタッフ ===== */
.staff-card{padding:12px; border-bottom:1px solid var(--line);}
.staff-card:last-child{border-bottom:none;}
.staff-top{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
.staff-top .dot{width:14px; height:14px; border-radius:50%; flex:none; border:none;}
.staff-top input{flex:1; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-weight:700; min-width:0;}
.staff-top .del{border:none; background:none; color:var(--sub); font-size:18px; padding:4px 6px;}
.rate-row{display:flex; gap:8px;}
.rate-row label{flex:1; font-size:11px; color:var(--sub); font-weight:600;}
.rate-row input{width:100%; border:1px solid var(--line); border-radius:8px; padding:7px 9px; margin-top:2px; font-variant-numeric:tabular-nums;}
.io-row{display:flex; gap:8px; margin-top:14px;}
.io-row .btn{flex:1;}
#pwArea{
  width:100%; min-height:88px; border:1px solid var(--line); border-radius:10px;
  padding:10px; font-size:12px; font-family:ui-monospace,Menlo,Consolas,monospace;
  word-break:break-all; resize:vertical; color:var(--ink); background:#FAFBFC;
}

/* ===== モーダル ===== */
#overlay{
  position:fixed; inset:0; background:rgba(20,28,36,.5); z-index:40; display:none;
  align-items:flex-end; justify-content:center;
}
#overlay.show{display:flex;}
#modal{
  background:var(--surface); border-radius:18px 18px 0 0; width:100%; max-width:560px;
  padding:18px 18px calc(20px + env(safe-area-inset-bottom));
}
#modal h2{font-size:15px; font-weight:800; margin-bottom:14px;}
.f-row{margin-bottom:12px;}
.f-row label{display:block; font-size:11px; font-weight:700; color:var(--sub); margin-bottom:4px;}
.f-row select,.f-row input{
  width:100%; border:1px solid var(--line); border-radius:10px; padding:10px; background:#fff;
}
.time-pair{display:flex; gap:8px;}
.time-pair > div{flex:1;}
.time-sel{display:flex; gap:4px; align-items:center;}
.time-sel select{flex:1;}
.m-actions{display:flex; gap:8px; margin-top:16px;}
.m-actions .btn{flex:1; padding:12px;}
</style>
</head>
<body>

<header>
  <h1><small>SHIFT & PAYROLL</small>シフト管理</h1>
  <input type="month" id="monthPicker">
</header>

<main>
  <!-- シフト入力 -->
  <section class="page active" id="page-input">
    <div class="section-label">日別シフト入力(タップで編集)</div>
    <div class="card" id="dayList"></div>
  </section>

  <!-- カレンダー -->
  <section class="page" id="page-cal">
    <div class="section-label" id="calTitle">カレンダー</div>
    <div class="card">
      <div class="cal-head">
        <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="sat">土</span><span class="sun">日</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </section>

  <!-- 集計 -->
  <section class="page" id="page-sum">
    <div class="total-hero">
      <div class="lbl">今月のバイト人件費合計</div>
      <div class="val" id="grandTotal">¥0</div>
    </div>
    <div class="card" style="padding:4px 10px;">
      <table class="sum">
        <thead><tr><th>名前</th><th>通常h</th><th>深夜h</th><th>給与</th></tr></thead>
        <tbody id="sumBody"></tbody>
      </table>
    </div>
    <div class="night-note">※ 深夜=22:00〜翌5:00。休憩は通常時間から控除(超過分は深夜から控除)。</div>
  </section>

  <!-- スタッフ・時給 -->
  <section class="page" id="page-staff">
    <div class="section-label">スタッフと時給設定</div>
    <div class="card" id="staffList"></div>
    <div class="io-row">
      <button class="btn btn-primary" onclick="addStaff()">+ スタッフ追加</button>
    </div>
    <div class="section-label">データ管理</div>
    <div class="io-row" style="margin-top:0;">
      <button class="btn btn-ghost" onclick="exportData()">バックアップ書き出し</button>
      <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">読み込み</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
    </div>
    <div class="section-label">あいことば(PC⇄スマホのデータ受け渡し)</div>
    <div class="card" style="padding:12px;">
      <textarea id="pwArea" placeholder="ここに あいことば を貼り付けて「復元」を押すか、「発行」で現在のデータを文字列化するよ" spellcheck="false"></textarea>
      <div class="io-row" style="margin-top:10px;">
        <button class="btn btn-primary" onclick="issuePassword()">発行してコピー</button>
        <button class="btn btn-ghost" onclick="restorePassword()">復元</button>
      </div>
      <div class="night-note" style="padding:8px 2px 0;">※ 発行した文字列をLINEやメモで別端末に送って貼り付ければ、全データ(全月分+スタッフ設定)がそのまま移せるよ。</div>
    </div>
  </section>
</main>

<nav>
  <button class="active" data-page="input"><span class="ico">✎</span>入力</button>
  <button data-page="cal"><span class="ico">▦</span>カレンダー</button>
  <button data-page="sum"><span class="ico">¥</span>集計</button>
  <button data-page="staff"><span class="ico">👤</span>スタッフ</button>
</nav>

<!-- シフト編集モーダル -->
<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h2 id="modalTitle">シフト追加</h2>
    <div class="f-row">
      <label>スタッフ</label>
      <select id="mStaff"></select>
    </div>
    <div class="f-row time-pair">
      <div>
        <label>出勤</label>
        <div class="time-sel">
          <select id="mSh"></select><span>:</span><select id="mSm"></select>
        </div>
      </div>
      <div>
        <label>退勤(24時以降は25,26…)</label>
        <div class="time-sel">
          <select id="mEh"></select><span>:</span><select id="mEm"></select>
        </div>
      </div>
    </div>
    <div class="f-row">
      <label>休憩(時間)</label>
      <input type="number" id="mBr" min="0" step="0.25" value="0" inputmode="decimal">
    </div>
    <div class="m-actions">
      <button class="btn btn-danger" id="mDelete" onclick="deleteShift()">削除</button>
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveShift()">保存</button>
    </div>
  </div>
</div>

<script>
/* ================= データ ================= */
const LS_KEY = 'shiftManagerV1';
const PALETTE = ['#0F6B5C','#2F6FB3','#B0642E','#7A4E9E','#B03A5B','#3E7A3E','#946E14','#456070','#8A4C33','#4A4E9E'];

const DEFAULT_STAFF = [
  ['閑田',0,0],['長尾',0,0],['吉荒',1246,1557],['及川',1246,1557],['畠山',1240,1550],
  ['高蔵',1226,0],['西村',1226,1532],['目黒',1226,1532],['松本',1226,1532],['後藤',1226,1532]
];

let state = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {
    staff: DEFAULT_STAFF.map((s,i)=>({id:'s'+i, name:s[0], base:s[1], night:s[2], color:PALETTE[i%PALETTE.length]})),
    shifts: {} // 'YYYY-MM-DD' -> [{id,staffId,sh,sm,eh,em,br}]
  };
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
const uid = ()=> Math.random().toString(36).slice(2,9);
const esc = s => String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ================= 月・日付 ================= */
let curMonth; // 'YYYY-MM'
const mp = document.getElementById('monthPicker');
(function(){
  const n = new Date();
  curMonth = n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
  mp.value = curMonth;
})();
mp.addEventListener('change', ()=>{ if(mp.value){ curMonth = mp.value; renderAll(); } });

function daysInMonth(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); }
function dateKey(ym,d){ return ym+'-'+String(d).padStart(2,'0'); }
function weekday(ym,d){ const [y,m]=ym.split('-').map(Number); return new Date(y,m-1,d).getDay(); } // 0=日
const WNAMES = ['日','月','火','水','木','金','土'];

/* ================= 計算 ================= */
function calcShift(sh){
  const st = sh.sh + sh.sm/60, en = sh.eh + sh.em/60;
  const gross = Math.max(0, en - st);
  const ov = (a,b)=> Math.max(0, Math.min(en,b) - Math.max(st,a));
  let night = ov(22,29) + ov(0,5);
  let normal = gross - night - (sh.br||0);
  if(normal < 0){ night = Math.max(0, night + normal); normal = 0; }
  return {normal, night};
}
function staffById(id){ return state.staff.find(s=>s.id===id); }
function shiftPay(sh){
  const s = staffById(sh.staffId); if(!s) return 0;
  const c = calcShift(sh);
  return c.normal*(s.base||0) + c.night*(s.night||0);
}
function monthShifts(ym){
  const out = [];
  const days = daysInMonth(ym);
  for(let d=1; d<=days; d++){
    const k = dateKey(ym,d);
    (state.shifts[k]||[]).forEach(sh=>out.push({...sh, day:d, key:k}));
  }
  return out;
}
function fmtTime(h,m){ return h + ':' + String(m).padStart(2,'0'); }
function fmtHours(v){ return (Math.round(v*100)/100).toLocaleString('ja-JP'); }
function fmtYen(v){ return '¥' + Math.round(v).toLocaleString('ja-JP'); }

/* ================= 描画:シフト入力 ================= */
function renderDayList(){
  const el = document.getElementById('dayList');
  const days = daysInMonth(curMonth);
  let html = '';
  for(let d=1; d<=days; d++){
    const k = dateKey(curMonth,d);
    const w = weekday(curMonth,d);
    const cls = w===6?'sat':w===0?'sun':'';
    const list = (state.shifts[k]||[]).slice().sort((a,b)=>(a.sh+a.sm/60)-(b.sh+b.sm/60));
    let dayPay = 0;
    const chips = list.map(sh=>{
      const s = staffById(sh.staffId);
      dayPay += shiftPay(sh);
      if(!s) return '';
      return `<button class="chip" style="background:${s.color}" onclick="openModal('${k}','${sh.id}')">
        ${esc(s.name)}<span class="t">${fmtTime(sh.sh,sh.sm)}-${fmtTime(sh.eh,sh.em)}</span></button>`;
    }).join('');
    html += `<div class="day-row">
      <div class="day-date ${cls}"><span class="d">${d}</span><span class="w">${WNAMES[w]}</span></div>
      <div class="day-shifts">${chips}<button class="chip-add" onclick="openModal('${k}')">＋</button></div>
      <div class="day-cost">${dayPay>0?fmtYen(dayPay):''}</div>
    </div>`;
  }
  el.innerHTML = html;
}

/* ================= 描画:カレンダー ================= */
function renderCalendar(){
  const [y,m] = curMonth.split('-').map(Number);
  document.getElementById('calTitle').textContent = `${y}年${m}月のシフト`;
  const days = daysInMonth(curMonth);
  const offset = (new Date(y,m-1,1).getDay()+6)%7; // 月曜始まり
  const todayKey = (()=>{ const n=new Date(); return dateKey(n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'), n.getDate()); })();
  let html = '';
  for(let i=0;i<offset;i++) html += '<div class="cal-cell empty"></div>';
  for(let d=1; d<=days; d++){
    const k = dateKey(curMonth,d);
    const w = weekday(curMonth,d);
    const cls = (w===6?'sat ':w===0?'sun ':'') + (k===todayKey?'today':'');
    const list = (state.shifts[k]||[]).slice().sort((a,b)=>(a.sh+a.sm/60)-(b.sh+b.sm/60));
    const minis = list.map(sh=>{
      const s = staffById(sh.staffId); if(!s) return '';
      return `<span class="mini" style="background:${s.color}"><span class="nm">${esc(s.name)}</span><span class="tm">${fmtTime(sh.sh,sh.sm)}-${fmtTime(sh.eh,sh.em)}</span></span>`;
    }).join('');
    html += `<div class="cal-cell ${cls}" onclick="openModal('${k}')"><span class="num">${d}</span>${minis}</div>`;
  }
  const rest = (offset + days) % 7;
  if(rest) for(let i=rest;i<7;i++) html += '<div class="cal-cell empty"></div>';
  document.getElementById('calGrid').innerHTML = html;
}

/* ================= 描画:集計 ================= */
function renderSummary(){
  const all = monthShifts(curMonth);
  const agg = {};
  let grand = 0;
  all.forEach(sh=>{
    const s = staffById(sh.staffId); if(!s) return;
    const c = calcShift(sh);
    const pay = c.normal*(s.base||0) + c.night*(s.night||0);
    if(!agg[s.id]) agg[s.id] = {normal:0, night:0, pay:0};
    agg[s.id].normal += c.normal; agg[s.id].night += c.night; agg[s.id].pay += pay;
    grand += pay;
  });
  document.getElementById('grandTotal').innerHTML = Math.round(grand).toLocaleString('ja-JP').replace(/^/,'¥');
  const rows = state.staff.filter(s=>agg[s.id]).map(s=>{
    const a = agg[s.id];
    return `<tr><td><span class="dot" style="background:${s.color}"></span>${esc(s.name)}</td>
      <td>${fmtHours(a.normal)}</td><td>${fmtHours(a.night)}</td><td><b>${fmtYen(a.pay)}</b></td></tr>`;
  }).join('');
  document.getElementById('sumBody').innerHTML = rows || '<tr><td colspan="4" style="text-align:center;color:var(--sub)">この月のシフトはまだないよ</td></tr>';
}

/* ================= 描画:スタッフ ================= */
function renderStaff(){
  const el = document.getElementById('staffList');
  el.innerHTML = state.staff.map(s=>`
    <div class="staff-card">
      <div class="staff-top">
        <span class="dot" style="background:${s.color}"></span>
        <input value="${esc(s.name)}" onchange="updStaff('${s.id}','name',this.value)" placeholder="名前">
        <button class="del" onclick="delStaff('${s.id}')">✕</button>
      </div>
      <div class="rate-row">
        <label>基本時給(円)<input type="number" inputmode="numeric" value="${s.base}" onchange="updStaff('${s.id}','base',this.value)"></label>
        <label>深夜時給(円)<input type="number" inputmode="numeric" value="${s.night}" onchange="updStaff('${s.id}','night',this.value)"></label>
      </div>
    </div>`).join('');
}
function updStaff(id, field, val){
  const s = staffById(id); if(!s) return;
  s[field] = field==='name' ? val.trim() : (Number(val)||0);
  save(); renderAll();
}
function addStaff(){
  state.staff.push({id:uid(), name:'新規スタッフ', base:0, night:0, color:PALETTE[state.staff.length%PALETTE.length]});
  save(); renderStaff();
}
function delStaff(id){
  const s = staffById(id);
  const used = Object.values(state.shifts).some(list=>list.some(sh=>sh.staffId===id));
  const msg = used ? `${s.name} のシフトデータも全て消えるよ。削除する?` : `${s.name} を削除する?`;
  if(!confirm(msg)) return;
  state.staff = state.staff.filter(x=>x.id!==id);
  for(const k in state.shifts){
    state.shifts[k] = state.shifts[k].filter(sh=>sh.staffId!==id);
    if(!state.shifts[k].length) delete state.shifts[k];
  }
  save(); renderAll();
}

/* ================= モーダル ================= */
let editKey = null, editId = null;
const $ = id => document.getElementById(id);
(function initSelects(){
  $('mSh').innerHTML = Array.from({length:24},(_,h)=>`<option value="${h}">${h}</option>`).join('');
  $('mEh').innerHTML = Array.from({length:30},(_,h)=>`<option value="${h}">${h}</option>`).join('');
  const mins = [0,15,30,45].map(m=>`<option value="${m}">${String(m).padStart(2,'0')}</option>`).join('');
  $('mSm').innerHTML = mins; $('mEm').innerHTML = mins;
})();
function openModal(key, id){
  editKey = key; editId = id || null;
  $('mStaff').innerHTML = state.staff.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  const d = Number(key.slice(-2));
  $('modalTitle').textContent = `${Number(key.slice(5,7))}月${d}日(${WNAMES[weekday(curMonth,d)]}) のシフト` + (id?'を編集':'を追加');
  if(id){
    const sh = (state.shifts[key]||[]).find(x=>x.id===id);
    if(sh){ $('mStaff').value=sh.staffId; $('mSh').value=sh.sh; $('mSm').value=sh.sm; $('mEh').value=sh.eh; $('mEm').value=sh.em; $('mBr').value=sh.br||0; }
    $('mDelete').style.display='block';
  }else{
    $('mSh').value=9; $('mSm').value=0; $('mEh').value=17; $('mEm').value=0; $('mBr').value=0;
    $('mDelete').style.display='none';
  }
  $('overlay').classList.add('show');
}
function closeModal(){ $('overlay').classList.remove('show'); }
function saveShift(){
  const sh = {
    id: editId || uid(),
    staffId: $('mStaff').value,
    sh:+$('mSh').value, sm:+$('mSm').value,
    eh:+$('mEh').value, em:+$('mEm').value,
    br: Math.max(0, Number($('mBr').value)||0)
  };
  if(!sh.staffId){ alert('スタッフを選んでね'); return; }
  if(sh.eh + sh.em/60 <= sh.sh + sh.sm/60){ alert('退勤は出勤より後にしてね(0時以降は24,25…で入力)'); return; }
  if(!state.shifts[editKey]) state.shifts[editKey] = [];
  if(editId){
    const i = state.shifts[editKey].findIndex(x=>x.id===editId);
    if(i>=0) state.shifts[editKey][i] = sh;
  }else{
    state.shifts[editKey].push(sh);
  }
  save(); closeModal(); renderAll();
}
function deleteShift(){
  if(!editId) return;
  state.shifts[editKey] = (state.shifts[editKey]||[]).filter(x=>x.id!==editId);
  if(!state.shifts[editKey].length) delete state.shifts[editKey];
  save(); closeModal(); renderAll();
}

/* ================= バックアップ ================= */
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,1)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shift-backup-' + curMonth + '.json';
  a.click(); URL.revokeObjectURL(a.href);
}
function importData(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const d = JSON.parse(r.result);
      if(!d.staff || !d.shifts) throw 0;
      state = d; save(); renderAll(); alert('読み込み完了!');
    }catch(e){ alert('ファイルの形式が違うみたい…'); }
  };
  r.readAsText(f); input.value='';
}

/* ================= あいことば ================= */
function bytesToB64(bytes){
  let bin = '';
  for(let i=0; i<bytes.length; i+=0x8000){
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i+0x8000));
  }
  return btoa(bin);
}
function b64ToBytes(b64){
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for(let i=0; i<bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
async function issuePassword(){
  const bytes = new TextEncoder().encode(JSON.stringify(state));
  let pw;
  if(window.CompressionStream){
    const cs = new CompressionStream('deflate-raw');
    const buf = await new Response(new Blob([bytes]).stream().pipeThrough(cs)).arrayBuffer();
    pw = 'SFT1.' + bytesToB64(new Uint8Array(buf));
  }else{
    pw = 'SFT0.' + bytesToB64(bytes);
  }
  const area = $('pwArea');
  area.value = pw;
  try{
    await navigator.clipboard.writeText(pw);
    alert('あいことばを発行してコピーしたよ!(' + pw.length.toLocaleString('ja-JP') + '文字)');
  }catch(e){
    area.select();
    alert('発行したよ!コピーできなかったから、テキストを長押し選択してコピーしてね');
  }
}
async function restorePassword(){
  const pw = $('pwArea').value.trim();
  if(!pw){ alert('あいことばを貼り付けてね'); return; }
  if(!confirm('この端末の今のデータは、あいことばの内容で上書きされるよ。復元する?')) return;
  try{
    const dot = pw.indexOf('.');
    const tag = pw.slice(0, dot), body = pw.slice(dot+1);
    let bytes = b64ToBytes(body);
    if(tag === 'SFT1'){
      if(!window.DecompressionStream) throw new Error('old-browser');
      const ds = new DecompressionStream('deflate-raw');
      const buf = await new Response(new Blob([bytes]).stream().pipeThrough(ds)).arrayBuffer();
      bytes = new Uint8Array(buf);
    }else if(tag !== 'SFT0'){
      throw new Error('bad-tag');
    }
    const d = JSON.parse(new TextDecoder().decode(bytes));
    if(!d.staff || !d.shifts) throw new Error('bad-data');
    state = d; save(); renderAll();
    $('pwArea').value = '';
    alert('じゅもんが ただしく となえられた!復元完了✨');
  }catch(e){
    alert('じゅもんが ちがいます…コピペが途中で切れてないか確認してね');
  }
}
